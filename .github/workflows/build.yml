name: Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64_generic, ramips-mt7621, mipsel_24kc]
        release: [23.05.6, 24.10.6, 25.12.3]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set matrix variables
        id: vars
        run: |
          # 设置包扩展名 (apk for 25.12.3, ipk for others)
          if [[ "${{ matrix.release }}" == "25.12.3" ]]; then
            echo "pkg_ext=apk" >> $GITHUB_OUTPUT
          else
            echo "pkg_ext=ipk" >> $GITHUB_OUTPUT
          fi

          # 设置 packages_arch (包输出目录的架构名)
          ARCH="${{ matrix.arch }}"
          if [[ "$ARCH" == "ramips-mt7621" || "$ARCH" == "mipsel_24kc" ]]; then
            echo "packages_arch=mipsel_24kc" >> $GITHUB_OUTPUT
          else
            echo "packages_arch=$ARCH" >> $GITHUB_OUTPUT
          fi

      - name: Build packages
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.release }}
          PACKAGES: luci-app-advanced

      - name: Debug - List bin directory
        if: always()
        run: find bin/ -type f 2>/dev/null || echo "bin/ empty or not found"

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.arch }}-${{ matrix.release }}-packages
          path: bin/packages/${{ steps.vars.outputs.packages_arch }}/action
          # path: bin/packages/${{ steps.vars.outputs.packages_arch }}/action/*.${{ steps.vars.outputs.pkg_ext }}
          if-no-files-found: warn